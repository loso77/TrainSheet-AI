<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f7fb">
  <title>TrainSheet AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">今天</p>
      <h1>TrainSheet AI</h1>
      <p class="sub">手写车号识别助手</p>
    </div>
    <div class="badge">V0.2</div>
  </header>

  <section class="hero-card">
    <div class="metric"><span id="todayCount" class="metric-number">0</span><span class="metric-label">今日识别</span></div>
    <div class="metric"><span id="needConfirmCount" class="metric-number">0</span><span class="metric-label">待确认</span></div>
  </section>

  <section class="action-grid">
    <label class="action-card primary">
      <span class="action-icon">📷</span><span class="action-title">拍照</span><span class="action-desc">直接调用相机</span>
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
    </label>
    <label class="action-card">
      <span class="action-icon">🖼️</span><span class="action-title">相册</span><span class="action-desc">选择已有照片</span>
      <input id="galleryInput" type="file" accept="image/*">
    </label>
  </section>

  <section id="previewCard" class="panel hidden">
    <div class="panel-title-row"><h2>图片预览</h2><button id="clearBtn" class="ghost-btn">清除</button></div>
    <img id="previewImage" class="preview-image" alt="照片预览">
  </section>

  <section class="panel">
    <div class="panel-title-row"><h2>处理流程</h2><span id="workflowState" class="state-pill">等待照片</span></div>
    <div class="steps">
      <div class="step" data-step="photo"><span>1</span><p>读取照片</p></div>
      <div class="step" data-step="paper"><span>2</span><p>寻找纸张</p></div>
      <div class="step" data-step="target"><span>3</span><p>定位目标区</p></div>
      <div class="step" data-step="ocr"><span>4</span><p>识别车号股道</p></div>
      <div class="step" data-step="confirm"><span>5</span><p>人工确认</p></div>
    </div>
    <button id="startBtn" class="big-btn" disabled>开始处理</button>
    <p id="statusText" class="status">请先拍照或从相册选择一张完整图片。</p>
  </section>

  <section id="debugPanel" class="panel hidden">
    <div class="panel-title-row"><h2>开发模式</h2><span class="state-pill blue">已开启</span></div>
    <p class="debug-text">V0.2 暂时只演示流程。下一版开始加入纸张定位与裁切结果显示。</p>
  </section>

  <section class="panel">
    <div class="panel-title-row"><h2>识别结果</h2><button id="demoBtn" class="ghost-btn">示例</button></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>时间</th><th>股道</th><th>车号</th><th>状态</th></tr></thead>
        <tbody id="resultBody"><tr class="empty-row"><td colspan="4">暂无结果</td></tr></tbody>
      </table>
    </div>
  </section>

  <footer class="footer"><button id="devToggle" class="footer-btn">开发模式</button><span>TrainSheet AI · V0.2.0</span></footer>
</main>
<script src="app.js"></script>
</body>
</html>
