<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f7fb">
  <title>TrainSheet AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">本地运行 · 人工确认学习版</p>
      <h1>TrainSheet AI</h1>
      <p class="sub">手写车号识别助手</p>
    </div>
    <div class="badge">V0.5</div>
  </header>

  <section class="hero-card">
    <div class="metric">
      <span id="learnCount" class="metric-number">0</span>
      <span class="metric-label">学习次数</span>
    </div>
    <div class="metric">
      <span id="needConfirmCount" class="metric-number">0</span>
      <span class="metric-label">待人工确认</span>
    </div>
  </section>

  <section class="action-grid">
    <label class="action-card primary">
      <span class="action-icon">📷</span>
      <span class="action-title">拍照</span>
      <span class="action-desc">调用 iPhone 相机</span>
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
    </label>
    <label class="action-card">
      <span class="action-icon">🖼️</span>
      <span class="action-title">相册</span>
      <span class="action-desc">选择已有照片</span>
      <input id="galleryInput" type="file" accept="image/*">
    </label>
  </section>

  <section id="previewCard" class="panel hidden">
    <div class="panel-title-row">
      <h2>原图预览</h2>
      <button id="clearBtn" class="ghost-btn">清除</button>
    </div>
    <img id="previewImage" class="preview-image" alt="照片预览">
  </section>

  <section class="panel">
    <div class="panel-title-row">
      <h2>处理流程</h2>
      <span id="workflowState" class="state-pill">等待照片</span>
    </div>
    <div class="steps">
      <div class="step" data-step="photo"><span>1</span><p>读取照片</p></div>
      <div class="step" data-step="target"><span>2</span><p>建立目标区</p></div>
      <div class="step" data-step="rows"><span>3</span><p>生成 31 行</p></div>
      <div class="step" data-step="candidates"><span>4</span><p>生成候选项</p></div>
      <div class="step" data-step="confirm"><span>5</span><p>人工确认学习</p></div>
    </div>
    <button id="startBtn" class="big-btn" disabled>开始处理</button>
    <p id="statusText" class="status">请先拍照或从相册选择一张完整图片。</p>
  </section>

  <section id="confirmPanel" class="panel hidden">
    <div class="panel-title-row">
      <h2>人工确认</h2>
      <span id="confirmIndex" class="state-pill orange">0 / 0</span>
    </div>

    <div class="confirm-card">
      <p class="confirm-title" id="confirmTitle">第 31 行</p>
      <p class="confirm-sub" id="confirmReason">程序不确定，请确认最终结果。</p>

      <div class="candidate-group">
        <p class="group-title">车号候选</p>
        <div id="trainCandidates" class="candidate-row"></div>
        <input id="manualTrain" class="manual-input" placeholder="车号手动输入，例如 077">
      </div>

      <div class="candidate-group">
        <p class="group-title">股道候选</p>
        <div id="trackCandidates" class="candidate-row"></div>
        <input id="manualTrack" class="manual-input" placeholder="股道手动输入，例如 17东">
      </div>

      <button id="confirmBtn" class="big-btn">确认并学习</button>
    </div>
  </section>

  <section class="panel">
    <div class="panel-title-row">
      <h2>学习记忆</h2>
      <button id="clearMemoryBtn" class="ghost-btn danger">清空</button>
    </div>
    <p class="hint">V0.5 已加入本地学习记忆。每次人工确认都会保存在手机浏览器里，不上传服务器。</p>
    <div id="memoryList" class="memory-list"></div>
  </section>

  <section class="panel">
    <div class="panel-title-row">
      <h2>识别结果</h2>
      <button id="demoBtn" class="ghost-btn">示例</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>序号</th><th>时间</th><th>股道</th><th>车号</th><th>状态</th></tr></thead>
        <tbody id="resultBody"><tr class="empty-row"><td colspan="5">暂无结果</td></tr></tbody>
      </table>
    </div>
  </section>

  <footer class="footer"><span>TrainSheet AI · V0.5.0</span></footer>
</main>
<script src="app.js"></script>
</body>
</html>
