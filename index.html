<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>TrainSheet AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="hero">
    <div class="logo">🚇</div>
    <div class="grow"><h1>TrainSheet AI</h1><p>个人安全版 · 股道31—61</p></div>
    <button id="settingsBtn" class="icon" aria-label="设置">⚙️</button>
  </header>

  <section id="settingsPanel" class="card hidden">
    <div class="section-head"><h2>连接设置</h2><button id="closeSettings" class="link-btn">收起</button></div>
    <label class="field"><span>Worker 地址</span><input id="workerUrl" type="url" placeholder="https://你的项目.workers.dev"></label>
    <button id="saveWorker" class="secondary">保存并检测</button>
    <div id="connectionState" class="hint">尚未检测。</div>
    <div class="divider"></div>
    <button id="logoutBtn" class="danger-outline">撤销本机授权</button>
    <p class="hint">网页中不保存大模型 API Key，也不保存设备授权码。</p>
  </section>

  <section id="authCard" class="card">
    <h2>设备授权</h2>
    <p class="muted">首次使用时输入你在 Worker 中设置的设备授权码。验证成功后，本机只保存可撤销令牌。</p>
    <label class="field"><span>设备授权码</span><input id="accessCode" type="password" autocomplete="one-time-code" placeholder="输入授权码"></label>
    <button id="authorizeBtn" class="primary">授权这台设备</button>
    <p id="authStatus" class="status"></p>
  </section>

  <section id="mainCard" class="card hidden">
    <label class="upload">
      📷 选择或拍摄车表
      <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" capture="environment">
    </label>

    <div id="previewWrap" class="preview-wrap hidden">
      <img id="preview" alt="车表照片">
      <button id="removeImage" class="remove" aria-label="移除">×</button>
    </div>

    <details class="notes">
      <summary>补充说明（可选）</summary>
      <textarea id="extraNote" maxlength="300" rows="3" placeholder="例如：照片右下角有反光"></textarea>
    </details>

    <button id="recognizeBtn" class="primary" disabled>开始识别</button>
    <div id="progress" class="progress hidden"><div></div></div>
    <p id="status" class="status">请选择照片。</p>
    <p id="quota" class="hint"></p>
  </section>

  <section id="resultCard" class="card hidden">
    <div class="section-head">
      <div><h2>识别结果</h2><p id="summary" class="hint"></p></div>
      <button id="clearResult" class="link-btn">清空</button>
    </div>
    <div class="legend"><span>🟨 需确认</span><span>🟩 较确定</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>股道</th><th>时间</th><th>车号</th><th>备注</th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
    <div class="actions">
      <button id="copyBtn" class="secondary">复制表格</button>
      <button id="csvBtn" class="secondary">导出 CSV</button>
    </div>
  </section>

  <footer>V2.0.0 · 图片不在本站落盘保存</footer>
</main>
<script src="app.js"></script>
</body>
</html>
